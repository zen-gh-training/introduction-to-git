<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack Overflown - 開発テーマのパズルゲーム</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <div class="main-panel">
        <div>
          <h1>🧱 Stack Overflown</h1>
          <div class="subtitle">オーバーフローする前にエラーパターンを揃えよう！</div>
        </div>
        <canvas id="gameCanvas" width="300" height="600"></canvas>
      </div>

      <div class="side-panel">
        <div class="info-section">
          <h3>スコア</h3>
          <div class="score" id="score">0</div>
          <div class="status" id="status">プレイ中...</div>
        </div>

        <div class="info-section">
          <h3>ターゲットパターン</h3>
          <div class="pattern-preview">
            <canvas id="patternCanvas" width="100" height="100"></canvas>
            <div class="pattern-name" id="patternName">読み込み中...</div>
          </div>
        </div>

        <div class="info-section">
          <h3>操作方法</h3>
          <div class="controls">
            <strong>←/→</strong> 移動<br />
            <strong>↑</strong> 回転<br />
            <strong>↓</strong> ソフトドロップ<br />
            <strong>Space</strong> ハードドロップ<br />
            <strong>P</strong> 一時停止
          </div>
        </div>
      </div>
    </div>

    <div class="game-over" id="gameOver">
      <h2>STACK OVERFLOW!</h2>
      <p>スタックが上限に達しました</p>
      <p>最終スコア: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">リスタート</button>
    </div>

    <script src="patterns.js"></script>
    <script src="index.js"></script>
  </body>
</html>
