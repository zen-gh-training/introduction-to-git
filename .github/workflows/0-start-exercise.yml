name: Step 0 # Start Exercise

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_1_FILE: ".github/steps/1-step.md"

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.7.0
    with:
      exercise-title: "Git 入門"
      intro-message: "CLI と VS Code を使って、ゲームを題材に Git バージョン管理を学びましょう。"

  localize_started_readme:
    name: Localize started README
    runs-on: ubuntu-latest
    needs: [start_exercise]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main

      - name: Resolve exercise issue number
        id: resolve-issue
        run: |
          ISSUE_NUMBER="${{ needs.start_exercise.outputs['issue-number'] }}"

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            ISSUE_NUMBER=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --json number,title,createdAt \
              --jq 'sort_by(.createdAt) | reverse | map(select(.title | startswith("Exercise:")))[0].number')
          fi

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            echo "Exercise issue number could not be resolved"
            exit 1
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Japanese started README
        env:
          ISSUE_NUMBER: ${{ steps.resolve-issue.outputs.issue_number }}
        run: |
          sed \
            -e "s|__GITHUB_ACTOR__|${GITHUB_ACTOR}|g" \
            -e "s|__GITHUB_REPOSITORY__|${GITHUB_REPOSITORY}|g" \
            -e "s|__ISSUE_NUMBER__|${ISSUE_NUMBER}|g" \
            .github/step-feedback/exercise-started-readme.md > README.md

      - name: Commit localized README
        uses: EndBug/add-and-commit@v9
        with:
          add: "README.md"
          message: "README を日本語化"
          default_author: github_actions

  localize_exercise_issue:
    name: Localize exercise issue
    runs-on: ubuntu-latest
    needs: [start_exercise]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve exercise issue number
        id: resolve-issue
        run: |
          ISSUE_NUMBER="${{ needs.start_exercise.outputs['issue-number'] }}"

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            ISSUE_NUMBER=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --json number,title,createdAt \
              --jq 'sort_by(.createdAt) | reverse | map(select(.title | startswith("Exercise:")))[0].number')
          fi

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            echo "Exercise issue number could not be resolved"
            exit 1
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update issue body in Japanese
        run: |
          sed \
            -e "s|__GITHUB_ACTOR__|${GITHUB_ACTOR}|g" \
            .github/step-feedback/exercise-started-issue.md > ISSUE_BODY.md

          gh issue edit "${{ steps.resolve-issue.outputs.issue_number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Exercise: Git 入門" \
            --body-file ISSUE_BODY.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  replace_exercise_name:
    name: Replace exercise name in .devcontainer.json
    runs-on: ubuntu-latest
    needs: [start_exercise, localize_started_readme]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main

      - name: Replace exercise name
        env:
          RepositoryName: ${{ github.event.repository.name }}
        run: |
          SETTINGS_FILE=".devcontainer/devcontainer.json"
          sed -i "s/\${RepoName}/${RepositoryName}/g" "$SETTINGS_FILE"

      - name: Commit updated devcontainer.json
        uses: EndBug/add-and-commit@v9
        with:
          add: ".devcontainer/devcontainer.json"
          message: "Set repository name"
          default_author: github_actions

  post_next_step_content:
    name: Post next step content
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve exercise issue number
        id: resolve-issue
        run: |
          ISSUE_NUMBER="${{ needs.start_exercise.outputs['issue-number'] }}"

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            ISSUE_NUMBER=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --json number,title,createdAt \
              --jq 'sort_by(.createdAt) | reverse | map(select(.title | startswith("Exercise:")))[0].number')
          fi

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            echo "Exercise issue number could not be resolved"
            exit 1
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ steps.resolve-issue.outputs.issue_number }}
          file: ${{ env.STEP_1_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ steps.resolve-issue.outputs.issue_number }}
          file: .github/step-feedback/watching-for-progress.md

      - name: Enable next step workflow
        run: |
          gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
